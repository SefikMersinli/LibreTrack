{% extends 'library/base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="card shadow-lg border-0 rounded-4 overflow-hidden" style="height: 80vh;">
        <div class="bg-primary p-3 text-white">
            <h5 class="mb-0 fw-bold"><i class="bi bi-chat-dots-fill me-2"></i>LibreTrack Topluluk Sohbeti</h5>
        </div>
        
        <div id="chat-window" class="p-4 overflow-auto bg-light" style="flex: 1;">
            {% for msg in chat_messages %}
                <div class="mb-3 {% if msg.user == request.user %}text-end{% endif %}">
                    <div class="d-inline-block p-3 rounded-4 shadow-sm 
                        {% if msg.user == request.user %}bg-primary text-white{% else %}bg-white text-dark{% endif %}" 
                        style="max-width: 75%;">
                        <small class="d-block fw-bold mb-1">@{{ msg.user.username }}</small>
                        {{ msg.content }}
                        <small class="d-block mt-1 opacity-50" style="font-size: 0.7rem;">{{ msg.created_at|date:"H:i" }}</small>
                    </div>
                </div>
            {% endfor %}
        </div>

        <div class="p-3 border-top bg-white">
            <form method="POST" class="d-flex gap-2">
                {% csrf_token %}
                <input type="text" name="content" class="form-control rounded-pill border-0 bg-light px-4" placeholder="Mesajını yaz..." required>
                <button type="submit" class="btn btn-primary rounded-circle"><i class="bi bi-send-fill"></i></button>
            </form>
        </div>
    </div>
</div>

<script>
    // Sayfa açıldığında en alt mesaja odaklan
    var objDiv = document.getElementById("chat-window");
    objDiv.scrollTop = objDiv.scrollHeight;
</script>
{% endblock %}
