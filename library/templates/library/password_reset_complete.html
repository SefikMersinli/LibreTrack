{% extends 'library/base.html' %}

{% block title %}İşlem Başarılı - LibreTrack{% endblock %}

{% block content %}
<style>
    .success-container {
        min-vh: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 4rem 1rem;
    }

    .success-card {
        background: var(--card) !important;
        border: 1px solid var(--border) !important;
        border-radius: 2rem !important;
        max-width: 500px;
        width: 100%;
        text-align: center;
        padding: 4rem 2rem;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .check-icon-wrapper {
        width: 80px;
        height: 80px;
        background: rgba(34, 197, 94, 0.1);
        color: #22c55e;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 2rem;
        font-size: 2.5rem;
        border: 2px solid rgba(34, 197, 94, 0.2);
        animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes scaleIn {
        from { transform: scale(0); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }
</style>

<div class="success-container fade-in">
    <div class="card success-card">
        <div class="check-icon-wrapper">
            <i class="bi bi-check-all"></i>
        </div>
        
        <h2 class="font-serif fw-bold text-white mb-3">Şifreniz Güncellendi!</h2>
        <p class="text-muted-foreground mb-5">
            Harika! Şifre değiştirme işleminiz başarıyla tamamlandı. Artık yeni şifrenizle kütüphanenize giriş yapabilirsiniz.
        </p>

        <div class="d-grid">
            <a href="{% url 'login' %}" class="btn btn-primary btn-lg py-3 fw-bold rounded-pill shadow-lg">
                <i class="bi bi-box-arrow-in-right me-2"></i>Şimdi Giriş Yap
            </a>
        </div>
    </div>
</div>
{% endblock %}
