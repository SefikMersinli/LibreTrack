{% extends 'library/base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="card-header bg-primary py-4 text-center">
                    <h3 class="text-white fw-bold mb-0"><i class="bi bi-shield-lock me-2"></i>Şifre Değiştir</h3>
                </div>
                <div class="card-body p-5">
                    <p class="text-muted small mb-4 text-center">Güvenliğiniz için lütfen mevcut şifrenizi girin ve yeni, güçlü bir şifre belirleyin.</p>
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            {{ form|crispy }}
                        </div>
                        
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold shadow">
                                <i class="bi bi-check2-circle me-2"></i>Parolamı Güncelle
                            </button>
                            <a href="{% url 'profile' %}" class="btn btn-light btn-lg rounded-pill fw-bold border">
                                Vazgeç
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Form içindeki yardım metinlerini küçültelim */
    .form-text { font-size: 0.75rem !important; color: #6c757d !important; }
    /* Hata mesajlarını renklendirelim */
    .invalid-feedback { font-weight: bold; }
</style>
{% endblock %}
