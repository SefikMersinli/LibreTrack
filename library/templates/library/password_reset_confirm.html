{% extends 'library/base.html' %}
{% load crispy_forms_tags %}

{% block title %}Şifre Belirle - LibreTrack{% endblock %}

{% block content %}
<style>
    /* MODERN ŞİFRE KARTI */
    .auth-card {
        background: var(--card) !important;
        border: 1px solid var(--border) !important;
        border-radius: 2rem !important;
        padding: 3rem !important;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5) !important;
    }

    .auth-title {
        font-family: 'Playfair Display', serif;
        font-weight: 900;
        letter-spacing: -0.02em;
        color: white;
    }

    /* CRISPY FORM TASARIMI */
    .modern-form label {
        color: var(--muted-foreground) !important;
        font-weight: 600;
        font-size: 0.85rem;
        margin-bottom: 0.5rem;
        display: block;
    }

    .modern-form input {
        background-color: var(--background) !important;
        border: 1px solid var(--border) !important;
        color: white !important;
        border-radius: 0.85rem !important;
        padding: 0.75rem 1.2rem !important;
        transition: all 0.2s ease;
    }

    .modern-form input:focus {
        border-color: var(--primary) !important;
        box-shadow: 0 0 0 4px rgba(234, 179, 8, 0.1) !important;
        outline: none;
    }

    .form-text {
        color: var(--muted-foreground) !important;
        font-size: 0.75rem !important;
        opacity: 0.6;
    }
</style>

<div class="row justify-content-center align-items-center min-vh-70 fade-in py-5">
    <div class="col-md-6 col-lg-5">
        <div class="card auth-card shadow-2xl">
            <div class="text-center mb-5">
                <div class="d-inline-flex align-items-center justify-content-center mb-3" 
                     style="width: 60px; height: 60px; background: rgba(234, 179, 8, 0.1); border-radius: 1rem;">
                    <i class="bi bi-key-fill text-warning fs-2"></i>
                </div>
                <h2 class="auth-title mb-2 fs-2">Yeni Şifre Belirle</h2>
                <p class="text-muted-foreground small">Lütfen hesabınız için yeni ve güvenli bir şifre seçin.</p>
            </div>

            <form method="post" class="modern-form">
                {% csrf_token %}
                <div class="mb-4">
                    {{ form|crispy }}
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3 shadow-lg fw-bold">
                    <i class="bi bi-check2-circle me-2"></i>Şifreyi Güncelle
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
