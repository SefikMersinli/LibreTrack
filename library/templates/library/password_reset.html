{% extends 'library/base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="card-header bg-primary py-4 text-center">
                    <h4 class="text-white fw-bold mb-0">🔑 Şifremi Unuttum</h4>
                </div>
                <div class="card-body p-5">
                    <p class="text-muted small mb-4">E-posta adresinizi girin, size şifre sıfırlama bağlantısı gönderelim.</p>
                    <form method="POST">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold">Bağlantı Gönder</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
